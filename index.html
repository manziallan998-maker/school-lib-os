<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LibraryOS — School Library Management</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --border: #e4e2dc;
  --text: #1a1917;
  --text2: #6b6860;
  --accent: #2563eb;
  --success: #16a34a;
  --danger: #dc2626;
  --warning: #d97706;
  --radius: 10px;
  --transition: 0.18s ease;
}
[data-theme="dark"] {
  --bg: #0f0f0e;
  --surface: #1a1917;
  --border: #2e2d29;
  --text: #f0ede8;
  --text2: #9e9b94;
  --accent: #3b82f6;
  --success: #22c55e;
  --danger: #ef4444;
  --warning: #f59e0b;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button { cursor: pointer; border: none; font-family: inherit; }
input, textarea { font-family: inherit; }

#config-warning {
  background: var(--warning); color: #fff; padding: 20px; text-align: center;
  display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
}

#auth-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--bg);
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px; width: 100%; max-width: 420px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-icon { font-size: 40px; margin-bottom: 12px; }
.auth-logo-text { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 900; }
.auth-logo-sub { font-size: 12px; color: var(--text2); }
.auth-title { font-size: 22px; font-weight: 700; margin: 24px 0 8px; }
.auth-sub { color: var(--text2); font-size: 14px; margin-bottom: 24px; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text); font-size: 14px;
}
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600;
  transition: all var(--transition); width: 100%;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: #1d4ed8; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.auth-links { text-align: center; margin-top: 16px; font-size: 13px; }
.auth-links a { color: var(--accent); cursor: pointer; }
.auth-links a:hover { text-decoration: underline; }

.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  display: flex; align-items: center; gap: 12px; padding: 14px 18px;
  background: var(--text); color: var(--bg); border-radius: var(--radius);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2); font-size: 14px; font-weight: 500;
  animation: slideUp 0.25s ease; max-width: 400px;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.warning { background: var(--warning); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

#app { display: none; padding: 40px; text-align: center; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
#app.visible { display: flex; }
</style>
</head>
<body>

<!-- CONFIG WARNING -->
<div id="config-warning">
  ⚠️ Supabase not configured. Check browser console for instructions.
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📚</div>
      <div class="auth-logo-text">LibraryOS</div>
      <div class="auth-logo-sub">School Library System</div>
    </div>

    <!-- LOGIN VIEW -->
    <div id="login-view">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your account</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>
      <div class="auth-links">
        Don't have an account? <a id="show-register">Create one</a>
      </div>
    </div>

    <!-- REGISTER VIEW -->
    <div id="register-view" style="display: none;">
      <div class="auth-title">Create account</div>
      <div class="auth-sub">Join LibraryOS</div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters">
      </div>
      <button class="btn btn-primary" id="register-btn">Create Account</button>
      <div class="auth-links">
        Already have an account? <a id="show-login">Sign in</a>
      </div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app">
  <h1>Welcome to LibraryOS! 📚</h1>
  <p>You are logged in as: <strong id="user-email">—</strong></p>
  <button class="btn btn-primary" id="logout-btn" style="width: auto; padding: 12px 24px; margin-top: 20px;">Sign Out</button>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ╔════════════════════════════════════════════════════════════════╗
// ║     SUPABASE CONFIGURATION - READ THE INSTRUCTIONS BELOW       ║
// ╚════════════════════════════════════════════════════════════════╝
//
// HOW TO SET UP YOUR SUPABASE CREDENTIALS (SAFE WAY):
//
// 1. Go to https://supabase.com/dashboard
// 2. Select your project (or create a new one)
// 3. Click "Settings" → "API" in the left sidebar
// 4. You will see:
//    - Project URL (looks like: https://xxxxx.supabase.co)
//    - Anon Key (starts with: eyJhbGc...)
// 5. Copy ONLY the Anon Key (NOT the Secret key)
// 6. Replace the value below
//
// ⚠️  IMPORTANT SECURITY NOTES:
// - NEVER use the Secret Key in frontend code
// - NEVER commit API keys to GitHub
// - The Anon Key is safe to expose (it's limited to public access)
// - If you accidentally exposed a secret key, regenerate it immediately
//

const SUPABASE_URL = "https://uvispwigefzhjvkqcxkm.supabase.co";  // Your project URL
const SUPABASE_ANON_KEY = "YOUR_ANON_KEY_HERE";  // Your public anon key (ONLY)

// Validation
const isConfigured = SUPABASE_ANON_KEY !== "YOUR_ANON_KEY_HERE" && SUPABASE_URL !== "https://uvispwigefzhjvkqcxkm.supabase.co";

if (!isConfigured) {
  console.error(`
╔════════════════════════════════════════════════════════════════╗
║ ⚠️  SUPABASE NOT CONFIGURED                                    ║
╠════════════════════════════════════════════════════════════════╣
║ Your app won't work until you add your Supabase credentials:   ║
║                                                                ║
║ 1. Go to: https://supabase.com/dashboard                       ║
║ 2. Select your project                                         ║
║ 3. Settings → API                                              ║
║ 4. Copy your ANON KEY (not the secret key!)                    ║
║ 5. Replace "YOUR_ANON_KEY_HERE" in index.html (line ~85)      ║
║                                                                ║
║ Example:                                                       ║
║ const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIs...";          ║
╚════════════════════════════════════════════════════════════════╝
  `);
  document.getElementById('config-warning').style.display = 'block';
  document.querySelectorAll('button').forEach(b => b.disabled = true);
}

let sb = null;
let currentUser = null;

function initApp() {
  try {
    // Initialize Supabase
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Check for existing session
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        currentUser = session.user;
        showApp();
      } else {
        showAuthScreen();
      }
    }).catch(err => {
      showToast("Connection error: " + err.message, "error");
    });

    setupEventListeners();
    setupTheme();
  } catch (err) {
    showToast("Failed to initialize app: " + err.message, "error");
  }
}

function setupEventListeners() {
  // Login
  document.getElementById('login-btn').addEventListener('click', handleLogin);
  document.getElementById('show-register').addEventListener('click', () => {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('register-view').style.display = 'block';
  });

  // Register
  document.getElementById('register-btn').addEventListener('click', handleRegister);
  document.getElementById('show-login').addEventListener('click', () => {
    document.getElementById('login-view').style.display = 'block';
    document.getElementById('register-view').style.display = 'none';
  });

  // Logout
  document.getElementById('logout-btn').addEventListener('click', handleLogout);
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (!email || !password) {
    showToast("Please fill in all fields", "error");
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = "Signing in...";

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) throw new Error(error.message);
    
    currentUser = data.user;
    showToast("✓ Logged in successfully!", "success");
    setTimeout(showApp, 500);
  } catch (err) {
    showToast("✗ " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}

async function handleRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;

  if (!email || !password || password.length < 6) {
    showToast("Email and password required (min 6 characters)", "error");
    return;
  }

  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  btn.textContent = "Creating account...";

  try {
    const { data, error } = await sb.auth.signUp({ 
      email, 
      password,
      options: {
        emailRedirectTo: window.location.origin
      }
    });
    
    if (error) throw new Error(error.message);
    
    showToast("✓ Account created! Check your email to confirm.", "success");
    document.getElementById('login-view').style.display = 'block';
    document.getElementById('register-view').style.display = 'none';
    document.getElementById('reg-email').value = '';
    document.getElementById('reg-password').value = '';
  } catch (err) {
    showToast("✗ " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Create Account";
  }
}

async function handleLogout() {
  try {
    await sb.auth.signOut();
    currentUser = null;
    showToast("✓ Signed out", "success");
    setTimeout(showAuthScreen, 500);
  } catch (err) {
    showToast("✗ " + err.message, "error");
  }
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('register-view').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  if (currentUser) {
    document.getElementById('user-email').textContent = currentUser.email;
  }
}

function showToast(message, type = "info") {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => toast.remove(), 4000);
}

function setupTheme() {
  const saved = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
}

// Only initialize if configured
if (isConfigured) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initApp);
  } else {
    initApp();
  }
}
</script>
</body>
</html>
